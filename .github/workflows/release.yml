name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
            bundles: 'app,dmg'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
            bundles: 'app,dmg'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
            bundles: 'deb,appimage'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
            bundles: 'nsis'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm deps
        run: npm install

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build frontend
        run: npm run build

      - name: Build Tauri bundle
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: List bundle output
        if: always()
        shell: bash
        run: |
          echo "=== release dir ==="
          ls -la "src-tauri/target/${{ matrix.target }}/release/" 2>/dev/null || echo "no release dir"
          echo "=== bundle dir ==="
          ls -la "src-tauri/target/${{ matrix.target }}/release/bundle/" 2>/dev/null || echo "no bundle dir"
          echo "=== artifacts ==="
          find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f 2>/dev/null || echo "no bundle files"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-switch-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: warn

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0-ci-$(date +%s)" >> "$GITHUB_OUTPUT"
            echo "tag=ci-$(date +%s)" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List downloaded artifacts
        run: find artifacts -type f 2>/dev/null || echo "no artifacts downloaded"

      - name: Generate update.json
        run: |
          node scripts/generate-update-json.mjs "${{ steps.version.outputs.version }}" artifacts > update.json
          cat update.json

      - name: Upload artifacts as release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            update.json
            artifacts/**/*

      - name: Upload artifacts as workflow artifact (no tag)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/
