name: release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
            bundles: 'app,dmg'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
            bundles: 'app,dmg'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
            bundles: 'deb,appimage'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
            bundles: 'nsis'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm deps
        run: npm install

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build frontend
        run: npm run build

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: List bundle output
        if: always()
        shell: bash
        run: |
          echo "=== release dir ==="
          ls -la "src-tauri/target/${{ matrix.target }}/release/" 2>/dev/null || echo "no release dir"
          echo "=== bundle dir ==="
          ls -la "src-tauri/target/${{ matrix.target }}/release/bundle/" 2>/dev/null || echo "no bundle dir"
          echo "=== artifacts ==="
          find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f 2>/dev/null || echo "no bundle files"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-switch-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: warn

  publish:
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Generate version info
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "release_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "version=0.1.0-nightly-$(date +%s)" >> "$GITHUB_OUTPUT"
            echo "release_tag=nightly" >> "$GITHUB_OUTPUT"
            echo "release_name=Nightly Build ($(date +%Y-%m-%d))" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0-ci-$(date +%s)" >> "$GITHUB_OUTPUT"
            echo "release_tag=ci-$(date +%s)" >> "$GITHUB_OUTPUT"
            echo "release_name=CI Build ($(date +%Y-%m-%d))" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List downloaded artifacts
        run: find artifacts -type f 2>/dev/null || echo "no artifacts downloaded"

      - name: Generate update.json
        run: |
          node scripts/generate-update-json.mjs \
            "${{ steps.version.outputs.version }}" \
            artifacts \
            "${{ steps.version.outputs.release_tag }}" \
            > update.json
          cat update.json

      - name: Generate release body
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            cp CHANGELOG.md release-body.md
          else
            echo "Auto-built from latest commit on main branch." > release-body.md
          fi

      - name: Delete old nightly release (if any)
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          # Retry helper with exponential backoff
          retry() {
            local n=1 max=5 delay=10
            while true; do
              "$@" && return 0 || {
                if [[ $n -lt $max ]]; then
                  >&2 echo "Retry $n/$max after ${delay}s..."
                  sleep "$delay"
                  n=$((n + 1))
                  delay=$((delay * 2))
                else
                  >&2 echo "Failed after $max attempts."
                  return 1
                fi
              }
            done
          }
          retry gh release delete nightly --yes 2>/dev/null || true
          retry git push --delete origin nightly 2>/dev/null || true
          echo "Waiting 10s to avoid rate limits..."
          sleep 10

      - name: Upload artifacts as release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retry helper with exponential backoff
          retry() {
            local n=1 max=5 delay=10
            while true; do
              "$@" && return 0 || {
                if [[ $n -lt $max ]]; then
                  >&2 echo "Retry $n/$max after ${delay}s..."
                  sleep "$delay"
                  n=$((n + 1))
                  delay=$((delay * 2))
                else
                  >&2 echo "Failed after $max attempts."
                  return 1
                fi
              }
            done
          }

          TAG="${{ steps.version.outputs.release_tag }}"
          TITLE="${{ steps.version.outputs.release_name }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"
          PRERELEASE_FLAG=""
          [[ "$PRERELEASE" == "true" ]] && PRERELEASE_FLAG="--prerelease"

          # Clean up any existing release for this tag (safe for re-runs)
          gh release delete "$TAG" --yes 2>/dev/null || true
          sleep 5

          # Create the release
          echo "Creating release: $TAG"
          retry gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file release-body.md \
            $PRERELEASE_FLAG

          # Upload update.json first
          echo "Uploading update.json..."
          retry gh release upload "$TAG" update.json --clobber
          sleep 3

          # Upload artifacts in batches to avoid secondary rate limits
          BATCH_SIZE=3
          BATCH_NUM=1
          BATCH=()
          echo "Uploading artifacts in batches of $BATCH_SIZE..."
          while IFS= read -r -d '' f; do
            BATCH+=("$f")
            if [[ ${#BATCH[@]} -ge $BATCH_SIZE ]]; then
              echo "  Batch $BATCH_NUM (${#BATCH[@]} files)..."
              retry gh release upload "$TAG" "${BATCH[@]}" --clobber
              sleep 5
              BATCH=()
              BATCH_NUM=$((BATCH_NUM + 1))
            fi
          done < <(find artifacts -type f -print0)

          # Upload remaining files
          if [[ ${#BATCH[@]} -gt 0 ]]; then
            echo "  Final batch (${#BATCH[@]} files)..."
            retry gh release upload "$TAG" "${BATCH[@]}" --clobber
          fi

          echo "Release published successfully!"
