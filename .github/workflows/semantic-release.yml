name: semantic-release
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retry helper with exponential backoff
          retry() {
            local n=1 max=5 delay=10
            while true; do
              "$@" && return 0 || {
                if [[ $n -lt $max ]]; then
                  >&2 echo "Retry $n/$max after ${delay}s..."
                  sleep "$delay"
                  n=$((n + 1))
                  delay=$((delay * 2))
                else
                  >&2 echo "Failed after $max attempts."
                  return 1
                fi
              }
            done
          }
          retry npx semantic-release

      # Tags pushed with GITHUB_TOKEN don't trigger other workflows (GitHub's
      # loop-prevention), so release.yml's `tags: v*` trigger never fires here.
      # Dispatch it explicitly for the tag semantic-release just created.
      - name: Trigger release build for new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(git describe --tags --exact-match HEAD 2>/dev/null || true)"
          if [[ -n "$TAG" ]]; then
            echo "New release tag: $TAG — dispatching release.yml"
            gh workflow run release.yml --ref "$TAG"
          else
            echo "No new tag on HEAD — semantic-release made no release, skipping dispatch."
          fi
